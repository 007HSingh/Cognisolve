server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;
    gzip_min_length 1024;
    gzip_vary on;

    # ── API reverse proxy ──────────────────────────────────────────────────────
    # Forwards /api/* to the EC2 backend, stripping the /api prefix.
    # This avoids mixed-content browser errors: the browser talks HTTPS to Render,
    # and Nginx relays to the EC2 backend over HTTP server-side.
    location /api/ {
        proxy_pass http://32.192.6.18:8000/;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Cache static JS/WASM assets aggressively (they are content-hashed)
    location ~* \.(js|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache other static assets
    location ~* \.(css|png|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for any unmatched path
    location / {
        try_files $uri $uri/ /index.html;
    }
}
